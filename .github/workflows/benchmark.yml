name: Benchmark

on:
  # pull_request:
  push:
  schedule:
    - cron: '54 * * * *'
    # - cron: 54 22 * * *
  workflow_dispatch:

jobs:
  benchmark-x86-64-linux-gcc:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get -y install build-essential cmake jq ninja-build
      - name: Configure
        run: cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Release
        env:
          CC: gcc
          CXX: g++
      - name: Build
        run: ninja -C build bssl_bench
      - name: Benchmark
        run: build/bssl_bench --threads 1 --benchmark_min_time=1s --benchmark_enable_random_interleaving --benchmark_min_time=0.1s --benchmark_repetitions=9 --benchmark_out=benchmark_raw.json --benchmark_out_format=json --benchmark_time_unit=us
      - name: Keep Medians Only
        run: |
          jq '.benchmarks = ([.benchmarks[] | select((.run_name | test("BM_SpeedRSAKeyGen/") | not) and .aggregate_name == "median") | .name = .run_name] | sort_by(.name))' benchmark_raw.json > benchmark.json
      - name: Append benchmark result
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Benchmark on x8-64 Linux GCC
          tool: googlecpp
          output-file-path: benchmark.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/x86_64-linux-gcc
          auto-push: false
          alert-threshold: 258%
          comment-on-alert: true
          alert-comment-cc-users: '@divVerent'
          max-items-in-chart: 90
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Store Commit
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        run: |
          git show gh-pages > bench.patch
      - name: Upload Results
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        uses: actions/upload-artifact@v7
        with:
          name: bench-x86_64-linux-gcc
          path: bench.patch
          if-no-files-found: error
  benchmark-x86-64-linux-clang:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get -y install build-essential cmake jq ninja-build clang-20
      - name: Configure
        run: cmake -B build -GNinja -DCMAKE_BUILD_TYPE=Release
        env:
          CC: clang-20
          CXX: clang++-20
      - name: Build
        run: ninja -C build bssl_bench
      - name: Benchmark
        run: build/bssl_bench --threads 1 --benchmark_min_time=1s --benchmark_enable_random_interleaving --benchmark_min_time=0.1s --benchmark_repetitions=9 --benchmark_out=benchmark_raw.json --benchmark_out_format=json --benchmark_time_unit=us
      - name: Keep Medians Only
        run: |
          jq '.benchmarks = ([.benchmarks[] | select((.run_name | test("BM_SpeedRSAKeyGen/") | not) and .aggregate_name == "median") | .name = .run_name] | sort_by(.name))' benchmark_raw.json > benchmark.json
      - name: Append benchmark result
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Benchmark on x8-64 Linux Clang
          tool: googlecpp
          output-file-path: benchmark.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/x86_64-linux-clang
          auto-push: false
          alert-threshold: 225%
          comment-on-alert: true
          alert-comment-cc-users: '@divVerent'
          max-items-in-chart: 90
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Store Commit
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        run: |
          git show gh-pages > bench.patch
      - name: Upload Results
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule' }}
        uses: actions/upload-artifact@v7
        with:
          name: bench-x86_64-linux-clang
          path: bench.patch
          if-no-files-found: error
  upload-results:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
      || github.event_name == 'schedule' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - benchmark-x86-64-linux-gcc
      - benchmark-x86-64-linux-clang
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          ref: gh-pages
      - name: Clean Up
        run: |
          rm -f bench-*
      - name: Download Results
        uses: actions/download-artifact@v8
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Add Results
        run: |
          git apply bench-*/*.patch
      - name: Commit and Push
        run: |
          git commit -a -m"Update benchmark results for commit ${GITHUB_SHA}."
          git push
